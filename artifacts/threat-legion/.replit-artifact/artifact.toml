kind = "web"
previewPath = "/"
title = "Threat Legion"
version = "1.0.0"
id = "artifacts/threat-legion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20160

[services.development]
run = "pnpm --filter @workspace/threat-legion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/threat-legion", "run", "build" ]
publicDir = "artifacts/threat-legion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20160"
BASE_PATH = "/"
